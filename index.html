<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Molly Milk Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Molly瑋珊</h2>

<div class="card">

<p>年齡 : <span id="age"></span></p>

<p>體重 : <span id="weight"></span> 公斤</p>

<p>建議奶量 : <span id="milk"></span> ml</p>

<p>奶粉匙數 : <span id="powder"></span> 湯匙</p>

<p>最後餵奶時間 : <span id="lastFeed">-</span></p>

<p>下次餵奶時間 : <span id="nextFeed">-</span></p>

<button id="feedBtn">記錄此次餵奶時間</button>

<h3>餵奶紀錄</h3>

<table id="historyTable">

<tr>
<th>日期</th>
<th>時間</th>
<th>毫升</th>
<th>間隔</th>
<th>操作</th>
</tr>

</table>

</div>

<br>

<button>Google Login</button>

<script src="app.js"></script>

</body>

</html>
