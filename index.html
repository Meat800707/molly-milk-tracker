<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Molly瑋珊</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Molly">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h1 class="title">Molly瑋珊</h1>

<div class="card">

<p>年齡 : <span id="age"></span></p>

<p>體重 : <span id="weight"></span> 公斤</p>

<p>建議奶量 : <span id="milk"></span> ml</p>

<p>奶粉匙數 : <span id="powder"></span> 湯匙</p>

<p>最後餵奶時間 : <span id="lastFeed">-</span></p>

<p>下次餵奶時間 : <span id="nextFeed">-</span></p>

<button id="feedBtn">記錄此次餵奶時間</button>

<h2>餵奶紀錄</h2>

<table id="historyTable">

<tr>
<th>日期</th>
<th>時間</th>
<th>毫升</th>
<th>間隔</th>
<th>操作</th>
</tr>

</table>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>

</html>
